<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>الصفحة مش موجودة | أحمد إيهاب</title>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="/assets/libs/fontawesome/css/all.min.css">

  <!-- Fonts -->
  <link rel="stylesheet" href="/assets/css/fonts.css">

  <style>
    :root {
      --white:   #ffffff;
      --off:     #f7f6f3;
      --line:    #e8e4dc;
      --muted:   #b0a898;
      --mid:     #5a5550;
      --ink:     #111210;
      --accent:  #2a6b4a;
    }

    *,
    *::before,
    *::after {
      margin:     0;
      padding:    0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background:      var(--off);
      color:           var(--ink);
      font-family:     'Tajawal', sans-serif;
      min-height:      100vh;
      display:         flex;
      flex-direction:  column;
      align-items:     center;
      justify-content: center;
      text-align:      center;
      padding:         2rem;
    }

    .err-code {
      font-family:    'Playfair Display', serif;
      font-size:      clamp(5rem, 20vw, 9rem);
      font-weight:    700;
      color:          var(--line);
      line-height:    1;
      letter-spacing: -0.03em;
      margin-bottom:  1.5rem;
      user-select:    none;
    }

    .err-icon {
      font-size:     2rem;
      color:         var(--accent);
      margin-bottom: 1.2rem;
    }

    .err-title {
      font-family:   'Tajawal', sans-serif;
      font-size:     clamp(1.4rem, 4vw, 2rem);
      font-weight:   800;
      color:         var(--ink);
      margin-bottom: 0.75rem;
    }

    .err-body {
      font-size:     1rem;
      color:         var(--mid);
      line-height:   1.8;
      max-width:     380px;
      margin-bottom: 2.5rem;
    }

    .err-btn {
      display:         inline-flex;
      align-items:     center;
      gap:             0.6rem;
      background:      var(--accent);
      color:           #fff;
      font-family:     'Tajawal', sans-serif;
      font-weight:     700;
      font-size:       1rem;
      padding:         0.85rem 2rem;
      border-radius:   100px;
      text-decoration: none;
      box-shadow:      0 4px 20px rgba(42, 107, 74, 0.25);
      transition:      background 0.2s, transform 0.15s;
    }

    .err-btn:hover {
      background: #1f5238;
      transform:  translateY(-2px);
    }

    .err-divider {
      width:      1px;
      height:     20px;
      background: var(--line);
      margin:     2rem auto;
    }

    .err-wa {
      display:         inline-flex;
      align-items:     center;
      gap:             0.5rem;
      color:           var(--mid);
      font-size:       0.88rem;
      text-decoration: none;
      transition:      color 0.2s;
    }

    .err-wa i     { color: #25d366; }
    .err-wa:hover { color: var(--ink); }
  </style>
</head>

<body>

  <div class="err-code">404</div>

  <div class="err-icon">
    <i class="fa-solid fa-map-location-dot"></i>
  </div>

  <h1 class="err-title">الصفحة دي مش موجودة</h1>

  <p class="err-body">
    يمكن الرابط اتغير أو اتحذف.<br>
    ارجع للصفحة الرئيسية وابدأ من الأول.
  </p>

  <a href="/" class="err-btn">
    <i class="fa-solid fa-arrow-right"></i>
    ارجع للرئيسية
  </a>

  <div class="err-divider"></div>

  <a href="https://wa.me/201204596397" class="err-wa" target="_blank" rel="noopener noreferrer">
    <i class="fa-brands fa-whatsapp"></i>
    أو راسل أحمد مباشرة على واتساب
  </a>

</body>

</html>
